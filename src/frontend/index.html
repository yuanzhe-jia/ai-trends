<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI趋势追踪</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --heatmap-hue-start: 260;
      --heatmap-hue-end: 320;
    }
    
    .heatmap-cell {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      border-radius: 12px;
    }
    
    .heatmap-cell:hover {
      transform: translateY(-2px);
    }
    
    @keyframes heatmapAppear {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .news-item {
      transition: all 0.3s ease;
      border-left: 3px solid transparent;
    }
    
    .news-item:hover {
      border-left-color: #8b5cf6;
      background: rgba(255, 255, 255, 0.1) !important;
      transform: translateX(4px);
    }
    
    .source-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    
    .trend-bar {
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      min-height: 4px;
    }
    
    .fade-in {
      animation: fadeIn 0.4s ease-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .pulse {
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    
    .gradient-text {
      background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 50%, #3b82f6 100%);
      background-size: 200% 200%;
      animation: gradientShift 3s ease infinite;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .card-glow {
      position: relative;
    }
    
    .card-glow::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 1rem;
      padding: 1px;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(236, 72, 153, 0.2), rgba(59, 130, 246, 0.3));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    
    .scrollbar-thin::-webkit-scrollbar {
      width: 6px;
    }
    
    .scrollbar-thin::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }
    
    .scrollbar-thin::-webkit-scrollbar-thumb {
      background: rgba(139, 92, 246, 0.4);
      border-radius: 3px;
    }
    
    .scrollbar-thin::-webkit-scrollbar-thumb:hover {
      background: rgba(139, 92, 246, 0.6);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 min-h-screen">
  <div class="container mx-auto px-4 py-6 max-w-5xl">
    <header class="text-center mb-6">
      <h1 class="text-3xl md:text-4xl font-bold gradient-text mb-2">
        AI趋势追踪
      </h1>
      <p class="text-gray-400 text-xs md:text-sm" id="data-source">更新日期：<span id="update-date">--</span></p>
    </header>

    <div class="card-glow bg-white/5 backdrop-blur-lg rounded-2xl p-4 mb-4 border border-white/10">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-lg font-semibold text-white flex items-center gap-2">
          <span class="w-2 h-2 bg-gradient-to-br from-purple-500 to-pink-500 rounded-full pulse"></span>
          今日关键词
        </h2>
      </div>
      <div id="heatmap-container" class="flex flex-wrap gap-2 min-h-[80px]">
        <div class="h-full flex items-center justify-center w-full">
          <span class="text-gray-400">加载中...</span>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <div class="card-glow lg:col-span-2 bg-white/5 backdrop-blur-lg rounded-2xl p-4 border border-white/10">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-lg font-semibold text-white flex items-center gap-2">
            <span class="w-2 h-2 bg-gradient-to-br from-blue-500 to-cyan-500 rounded-full"></span>
            相关新闻
            <span id="news-count" class="text-xs text-gray-400 font-normal"></span>
          </h2>
          <button id="clear-filter" class="px-3 py-1 bg-gradient-to-r from-purple-500/30 to-pink-500/30 text-white text-xs rounded-lg hover:from-purple-500/40 hover:to-pink-500/40 transition-all border border-purple-500/30 hidden">
            清除筛选
          </button>
        </div>
        <div id="news-list" class="h-[280px] overflow-y-auto pr-2 scrollbar-thin">
          <div class="h-full flex items-center justify-center">
            <span class="text-gray-400">加载中...</span>
          </div>
        </div>
      </div>

      <div class="card-glow bg-white/5 backdrop-blur-lg rounded-2xl p-4 border border-white/10">
        <h2 class="text-lg font-semibold text-white flex items-center gap-2 mb-3">
          <span class="w-2 h-2 bg-gradient-to-br from-green-500 to-emerald-500 rounded-full"></span>
          趋势历史
        </h2>
        <div id="trend-history" class="h-[280px]">
          <div class="h-full flex flex-col">
            <div class="mb-4"></div>
            <div class="flex-1 flex items-center justify-center">
              <span class="text-gray-400 text-sm">选择关键词查看趋势历史</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer class="text-center mt-6 text-gray-500 text-xs">
      <p></p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
